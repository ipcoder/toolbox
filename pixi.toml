[workspace]
name = "ialgdev-workspace"
channels = ["conda-forge"]
platforms = ["linux-64"]

[pypi-dependencies]
ialgdev = { path = ".", editable = true }
"ialdev-maths" = { path = "./maths", editable = true }
"ialdev-io" = { path = "./fio", editable = true }
"ialdev-img" = { path = "./imgtools", editable = true }
"ialdev-core" = { path = "./algutils", editable = true }
"ialdev-dataman" = { path = "./dataman", editable = true }
"ialdev-vis" = { path = "./vis", editable = true }
"ialdev-annotations" = { path = "./annotations", editable = true }
"ialdev-engines" = { path = "./engines", editable = true }
# Build / publish `ialdev-*` wheels (``flit publish`` / ``python -m build``; flit_core is each package’s [build-system])
flit = ">=3.11,<4"
build = ">=1.2.0"

[dependencies]
# Interpreter for the env (``[project]`` in ``pyproject.toml`` is packaging metadata; pixi.toml must list python explicitly)
python = "==3.12"
graphviz = ">=14.1.2,<15"  # to avoid relaying on system apt install
pytest = ">=7.0"
pytest-cov = ">=3.0"

[tasks]
# Build all ``ialdev-*`` wheels (no VCS list — works with dirty git)
build-ialdev = "bash -c 'for d in algutils fio imgtools maths dataman vis annotations engines; do (cd \"$d\" && flit build --no-use-vcs) || exit 1; done'"
# Use repo ``pytest.ini`` (pythonpath + test layout) so runs match the Testing sidebar.
test-all = "MPLBACKEND=Agg python -m pytest -c pytest.ini"
test-packages = "MPLBACKEND=Agg python -m pytest -c pytest.ini algutils/tests maths/tests fio/tests imgtools/tests"
test-integration = "MPLBACKEND=Agg python -m pytest -c pytest.ini dataman/tests vis/tests"
test-ialgdev-extras = "MPLBACKEND=Agg python -m pytest -c pytest.ini annotations/tests"

publish-pypi = "./publish_pypi"
