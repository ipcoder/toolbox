[workspace]
name = "resman"
version = "0.1.0"
description = "Generic resource model framework with registration, discovery, and management"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10"
pandas = ">=1.3"
pydantic = ">=2.0"
pyyaml = ">=5.4"

[pypi-dependencies]
resman = { path = ".", editable = true }
algutils = { path = "../algutils", editable = true }
datacast = { path = "../datacast", editable = true }

[feature.dev.dependencies]
pytest = ">=7.0"
pytest-cov = ">=3.0"

[feature.dev.pypi-dependencies]
resman = { path = ".", editable = true }
algutils = { path = "../algutils", editable = true }
datacast = { path = "../datacast", editable = true }

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[feature.dev.tasks]
test = "pytest tests -v"
