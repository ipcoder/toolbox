[workspace]
name = "datacast"
version = "0.1.0"
description = "Folder scanning, data casting, collection, and transforms for structured file trees"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10"
numpy = ">=1.20"
pandas = ">=1.3"
pydantic = ">=2.0"
pyyaml = ">=5.4"
regex = ">=2021"
tqdm = ">=4.60"

[pypi-dependencies]
datacast = { path = ".", editable = true }
algutils = { path = "../algutils", editable = true }

[feature.dev.dependencies]
pytest = ">=7.0"
pytest-cov = ">=3.0"

[feature.dev.pypi-dependencies]
datacast = { path = ".", editable = true }
algutils = { path = "../algutils", editable = true }

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[feature.dev.tasks]
test = "pytest tests -v"
