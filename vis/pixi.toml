[workspace]
name = "algovis"
version = "0.1.0"
description = "Visualization utilities: image grids, interactive viewers, colormaps, and matplotlib helpers"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10"
numpy = ">=1.20"
matplotlib = ">=3.5"
regex = ">=2021"

[pypi-dependencies]
algovis = { path = ".", editable = true }
algutils = { path = "../algutils", editable = true }

[feature.dev.dependencies]
pytest = ">=7.0"
pytest-cov = ">=3.0"

[feature.dev.pypi-dependencies]
algovis = { path = ".", editable = true }
algutils = { path = "../algutils", editable = true }

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[feature.dev.tasks]
test = "pytest tests -v"
