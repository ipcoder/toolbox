[pytest]
# Single config when invoking pytest from the repo root or IDE (see ``.vscode/settings.json``).
# Nested packages also define ``[tool.pytest.ini_options]`` for ``cd package && pytest``;
# use ``pytest -c ../pytest.ini`` from a subpackage if config clashes.
testpaths =
    algutils/tests
    maths/tests
    fio/tests
    imgtools/tests
    dataman/tests
    vis/tests
    ; annotations/tests   


markers =
    refactor: tests pending refactor; exclude from default runs

pythonpath =
    .
    algutils/src
    maths/src
    fio/src
    imgtools/src
    dataman/src
    vis/src
    annotations/src
    engines/src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -m "not refactor" --import-mode=importlib
